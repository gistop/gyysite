services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3001
      PUBLISH_ROOT: /data/sites
      CORS_ORIGIN: ${CORS_ORIGIN:-true}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      OSS_REGION: ${OSS_REGION:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_PREFIX: ${OSS_PREFIX:-sites}
      OSS_PUBLIC_BASE_URL: ${OSS_PUBLIC_BASE_URL:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      GITHUB_BRANCH: ${GITHUB_BRANCH:-main}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_PUBLISH_PREFIX: ${GITHUB_PUBLISH_PREFIX:-}
      GITHUB_PROJECT_REPO: ${GITHUB_PROJECT_REPO:-}
      CLOUDFLARE_PAGES_URL: ${CLOUDFLARE_PAGES_URL:-}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${CLOUDFLARE_PAGES_PROJECT_NAME:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
    volumes:
      - published-sites:/data/sites

volumes:
  published-sites:
