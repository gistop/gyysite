services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3001
      PUBLISH_ROOT: /data/sites
      CORS_ORIGIN: ${CORS_ORIGIN:-true}
      OSS_REGION: ${OSS_REGION:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_PREFIX: ${OSS_PREFIX:-sites}
      OSS_PUBLIC_BASE_URL: ${OSS_PUBLIC_BASE_URL:-}
    volumes:
      - published-sites:/data/sites

volumes:
  published-sites:
